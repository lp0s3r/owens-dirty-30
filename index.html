<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Party Princess Scavenger Hunt</title>

<!-- Firebase v9 compat SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<style>
body { font-family: sans-serif; margin: 0; background: #ff66b2; }
header { background: #ff66b2; color: white; padding: 1em 1em 0.5em; text-align: center; }
header .crown { font-size: 2em; display: block; margin-bottom: -0.1em; }
header h1 { font-size: 1.8em; margin: 0 0 0.2em 0; }
header p { margin: 0; font-size: 0.9em; opacity: 0.9; }
.container { padding: 1em; max-width: 800px; margin: auto; }
.task, .nickname-box, .leaderboard-box { background: #ffe6f0; padding: 1em; margin: 1em 0; border-radius: 10px; border: 2px solid #fff; }
button { background: #ff66b2; color: white; border: none; padding: 0.5em 1em; border-radius: 5px; cursor: pointer; }
input[type="file"] { margin-top: 0.5em; }

/* Gallery thumbnails */
.gallery img { width: 100px; height: 100px; object-fit: cover; border-radius: 6px; border: 2px solid #fff; cursor: pointer; }
.gallery { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 1em; }

/* Lightbox overlay */
.lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
.lightbox.active { display: flex; }
.lightbox img { max-width: 90%; max-height: 90%; border-radius: 10px; }
.lightbox-close { position: fixed; top: 15px; right: 20px; color: white; font-size: 2em; cursor: pointer; z-index: 1001; }

/* Nickname input */
#nickname { width: 100%; padding: 0.5em; border-radius: 5px; border: 2px solid #ff66b2; font-size: 0.95em; box-sizing: border-box; color: #000; }
#nickname::placeholder { color: #000; }

/* Upload hint */
.upload-hint { color: white; font-size: 0.85em; margin: 0.5em 0 0.5em 0; }

/* Leaderboard */
.leaderboard-box ol { margin: 0; padding-left: 1.5em; }
.leaderboard-box li { padding: 0.3em 0; }

h2 { color: #fff; }
.completed { opacity: 0.5; }
</style>
</head>
<body>

<header>
  <span class="crown">👑</span>
  <h1>Party Princess<br>Scavenger Hunt</h1>
  <p>Celebrating Owen's Dirty 30</p>
</header>

<div class="container">

<div class="nickname-box">
  <input id="nickname" placeholder="Enter nickname *" />
</div>

<p class="upload-hint">Photos take 5-10 seconds to upload and you'll see a success message. Please don't click submit again.</p>

<div id="tasks"></div>

<h2>📸 Gallery</h2>
<div id="gallery" class="gallery"></div>

<!-- Lightbox for full-size photos -->
<div id="lightbox" class="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
  <img id="lightbox-img" src="" />
</div>

<h2>🏆 Leaderboard</h2>
<div class="leaderboard-box">
  <ol id="leaderboard"></ol>
</div>

</div>

<script>
// Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyABFcEisqbFaWr9aSQ1VTmXhsqFWY8bsJ4",
  authDomain: "owens-30th.firebaseapp.com",
  projectId: "owens-30th",
  storageBucket: "owens-30th.firebasestorage.app",
  messagingSenderId: "538288246926",
  appId: "1:538288246926:web:f699c66028bbb9caabf9df"
};
firebase.initializeApp(firebaseConfig);
const storage = firebase.storage();
const db = firebase.firestore();

// Task definitions
const tasks = [
  { id: 1, name: "The birthday boy doing something embarrassing", points: 15 },
  { id: 2, name: "Your best cheer pose", points: 10 },
  { id: 3, name: "Recreate the group chat photo", points: 10 },
  { id: 4, name: "A photo with the person you've known the longest", points: 10 },
  { id: 5, name: "Selfie with someone else celebrating a birthday", points: 15 },
  { id: 6, name: "Give a stranger a piggyback", points: 25 },
  { id: 7, name: "The number 1996 (combining photos is acceptable)", points: 10 },
  { id: 8, name: "You and the birthday boy", points: 15 },
  { id: 9, name: "A member of the group doing a shot", points: 15 },
  { id: 10, name: "Someone with a spice girl vibe (think leopard print or blonde & pink)", points: 10 },
  { id: 11, name: "A candid photo of the birthday boy", points: 10 },
  { id: 12, name: "A group recreating a boy band cover", points: 10 },
  { id: 13, name: "Salsa with a stranger", points: 25 },
  { id: 14, name: "A selfie with a neon sign", points: 10 },
  { id: 15, name: "Someone who looks like the birthday boy", points: 15 },
  { id: 16, name: "A full squad photo", points: 20 }
];

// Lightbox functions
function openLightbox(src) {
  document.getElementById("lightbox-img").src = src;
  document.getElementById("lightbox").classList.add("active");
}
function closeLightbox() {
  document.getElementById("lightbox").classList.remove("active");
}

document.addEventListener("DOMContentLoaded", () => {
  // Restore saved nickname
  const saved = localStorage.getItem("scavenger-nickname");
  if (saved) document.getElementById("nickname").value = saved;

  const tasksDiv = document.getElementById("tasks");

  // Render all tasks
  tasks.forEach(task => {
    const div = document.createElement("div");
    div.className = "task";
    div.innerHTML = `
      <strong>${task.name} (${task.points} pts)</strong><br>
      <input type="file" id="file-${task.id}">
      <button id="btn-${task.id}">Submit</button>
    `;
    tasksDiv.appendChild(div);

    document.getElementById(`btn-${task.id}`).addEventListener("click", () => submitTask(task));
  });

  loadData();

  // Save nickname on change
  document.getElementById("nickname").addEventListener("input", () => {
    localStorage.setItem("scavenger-nickname", document.getElementById("nickname").value.trim());
    loadData();
  });
});

// Submit a task
async function submitTask(task) {
  const nickname = document.getElementById("nickname").value.trim();
  if (!nickname) return alert("Enter nickname");

  const fileInput = document.getElementById(`file-${task.id}`);
  const file = fileInput.files[0];
  if (!file) return alert("Select a photo");

  try {
    // Check duplicate submission
    const existing = await db.collection("leaderboard")
      .where("nickname", "==", nickname)
      .where("task", "==", task.name)
      .get();

    if (!existing.empty) return alert("You already submitted this task!");

    // Upload file
    const storageRef = storage.ref(`${nickname}/${Date.now()}-${file.name}`);
    const snapshot = await storageRef.put(file);
    const url = await snapshot.ref.getDownloadURL();

    // Save Firestore entry
    await db.collection("leaderboard").add({
      nickname,
      task: task.name,
      points: task.points,
      image: url,
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });

    fileInput.value = "";
    loadData();
    alert("Submitted!");
  } catch (err) {
    console.error(err);
    alert("Upload failed: " + err.message);
  }
}

// Load gallery and leaderboard
async function loadData() {
  const nickname = document.getElementById("nickname").value.trim();
  const gallery = document.getElementById("gallery");
  const leaderboard = document.getElementById("leaderboard");
  gallery.innerHTML = "";
  leaderboard.innerHTML = "";

  const snapshot = await db.collection("leaderboard").orderBy("timestamp", "asc").get();
  const scores = {};
  const submittedTasks = {};

  snapshot.forEach(doc => {
    const row = doc.data();
    if (row.image) {
      const img = document.createElement("img");
      img.src = row.image;
      img.onclick = () => openLightbox(row.image);
      gallery.appendChild(img);
    }
    scores[row.nickname] = (scores[row.nickname] || 0) + row.points;
    submittedTasks[row.nickname] = submittedTasks[row.nickname] || {};
    submittedTasks[row.nickname][row.task] = true;
  });

  // Disable completed tasks
  tasks.forEach(task => {
    const btn = document.getElementById(`btn-${task.id}`);
    const input = document.getElementById(`file-${task.id}`);
    if (nickname && submittedTasks[nickname]?.[task.name]) {
      btn.disabled = true;
      btn.textContent = "Completed";
      input.disabled = true;
    } else {
      btn.disabled = false;
      btn.textContent = "Submit";
      input.disabled = false;
    }
  });

  // Render leaderboard with numbered positions
  Object.entries(scores).sort((a,b) => b[1]-a[1]).forEach(([name, score]) => {
    const li = document.createElement("li");
    li.textContent = `${name}: ${score} pts`;
    leaderboard.appendChild(li);
  });
}
</script>
</body>
</html>
