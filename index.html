<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Party Princess Scavenger Hunt</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>

<style>
  body { font-family: sans-serif; margin: 0; background: #ffe6f0; }
  header { background: #ff66b2; color: white; padding: 1em; text-align: center; }
  .container { padding: 1em; max-width: 800px; margin: auto; }
  .task { background: #ffe6f0; padding: 1em; margin: 1em 0; border-radius: 10px; border: 2px solid #ff66b2; }
  button { background: #ff66b2; color: white; border: none; padding: 0.5em 1em; border-radius: 5px; cursor: pointer; }
  input[type="file"] { margin-top: 0.5em; }
  img { width: 100px; height: 100px; object-fit: cover; border-radius: 6px; border: 2px solid #ff66b2; }
  .gallery { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 1em; }
  #nickname { width: 100%; padding: 0.5em; margin-bottom: 1em; border-radius: 5px; border: 2px solid #ff66b2; }
  h2 { color: #ff66b2; }
</style>
</head>

<body>

<header>
  <h1>🎉 Party Princess Scavenger Hunt</h1>
</header>

<div class="container">

<input id="nickname" placeholder="Enter nickname" />

<div id="tasks"></div>

<h2>📸 Gallery</h2>
<div id="gallery" class="gallery"></div>

<h2>🏆 Leaderboard</h2>
<ul id="leaderboard"></ul>

</div>

<script type="module">

// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyABFcEisqbFaWr9aSQ1VTmXhsqFWY8bsJ4",
  authDomain: "owens-30th.firebaseapp.com",
  projectId: "owens-30th",
  storageBucket: "owens-30th.firebasestorage.app",
  messagingSenderId: "538288246926",
  appId: "1:538288246926:web:f699c66028bbb9caabf9df"
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

// 🎯 Updated tasks
const tasks = [
  { id: 1, name: "The birthday boy doing something embarrassing", points: 15 },
  { id: 2, name: "Your best cheer pose", points: 10 },
  { id: 3, name: "Recreate the group chat photo", points: 10 },
  { id: 4, name: "Selfie with someone else celebrating a birthday", points: 15 },
  { id: 5, name: "Give a stranger a piggyback", points: 25 },
  { id: 6, name: "The number 1996 (combining photos is acceptable)", points: 10 },
  { id: 7, name: "A member of the group doing a shot", points: 15 },
  { id: 8, name: "Someone with a spice girl vibe (leopard print or blonde & pink)", points: 10 },
  { id: 9, name: "Salsa with a stranger", points: 25 },
  { id: 10, name: "A selfie with a neon sign", points: 10 },
  { id: 11, name: "Someone who looks like the birthday boy", points: 15 }
];

const tasksDiv = document.getElementById("tasks");

// Render tasks
tasks.forEach(task => {
  const div = document.createElement("div");
  div.className = "task";
  div.innerHTML = `
    <strong>${task.name} (${task.points} pts)</strong><br>
    <input type="file" id="file-${task.id}">
    <button onclick="upload(${task.id})">Upload</button>
  `;
  tasksDiv.appendChild(div);
});

// Upload function
window.upload = async (taskId) => {
  const nickname = document.getElementById("nickname").value;
  if (!nickname) return alert("Enter nickname");

  const fileInput = document.getElementById(`file-${taskId}`);
  const file = fileInput.files[0];
  if (!file) return alert("Select photo");

  const storageRef = ref(storage, `photos/${Date.now()}-${file.name}`);
  await uploadBytes(storageRef, file);
  const url = await getDownloadURL(storageRef);

  const task = tasks.find(t => t.id === taskId);

  await addDoc(collection(db, "submissions"), {
    nickname,
    task: task.name,
    points: task.points,
    image: url
  });

  alert("Uploaded!");
  loadData();
};

// Load gallery + leaderboard
async function loadData() {
  const snapshot = await getDocs(collection(db, "submissions"));

  const gallery = document.getElementById("gallery");
  const leaderboard = document.getElementById("leaderboard");

  gallery.innerHTML = "";
  leaderboard.innerHTML = "";

  const scores = {};

  snapshot.forEach(doc => {
    const data = doc.data();

    const img = document.createElement("img");
    img.src = data.image;
    gallery.appendChild(img);

    scores[data.nickname] = (scores[data.nickname] || 0) + data.points;
  });

  Object.entries(scores)
    .sort((a,b) => b[1] - a[1])
    .forEach(([name, score]) => {
      const li = document.createElement("li");
      li.textContent = `${name}: ${score} pts`;
      leaderboard.appendChild(li);
    });
}

loadData();

</script>

</body>
</html>
