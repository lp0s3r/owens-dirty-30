<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Party Princess Scavenger Hunt</title>

<!-- Supabase JS library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.28.0/dist/supabase.min.js"></script>

<style>
body { font-family: sans-serif; margin: 0; background: #ffe6f0; }
header { background: #ff66b2; color: white; padding: 1em; text-align: center; }
.container { padding: 1em; max-width: 800px; margin: auto; }
.task { background: #ffe6f0; padding: 1em; margin: 1em 0; border-radius: 10px; border: 2px solid #ff66b2; }
button { background: #ff66b2; color: white; border: none; padding: 0.5em 1em; border-radius: 5px; cursor: pointer; }
input[type="file"] { margin-top: 0.5em; }
img { width: 100px; height: 100px; object-fit: cover; border-radius: 6px; border: 2px solid #ff66b2; }
.gallery { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 1em; }
#nickname { width: 100%; padding: 0.5em; margin-bottom: 1em; border-radius: 5px; border: 2px solid #ff66b2; }
h2 { color: #ff66b2; }
</style>
</head>
<body>

<header>
  <h1>🎉 Party Princess Scavenger Hunt</h1>
</header>

<div class="container">

<input id="nickname" placeholder="Enter nickname" />

<!-- Tasks -->
<div id="tasks"></div>

<h2>📸 Gallery</h2>
<div id="gallery" class="gallery"></div>

<h2>🏆 Leaderboard</h2>
<ul id="leaderboard"></ul>

</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  // Initialize Supabase client AFTER library loads
  const SUPABASE_URL = "https://jplkrizyfeupwqchbbhy.supabase.co";
  const SUPABASE_KEY = "sb_publishable_Z7-dWwAw7___Ik2Di2ydLA_MB8NeqFZ";
  const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Define tasks
  const tasks = [
    { id: 1, name: "The birthday boy doing something embarrassing", points: 15 },
    { id: 2, name: "Your best cheer pose", points: 10 },
    { id: 3, name: "Recreate the group chat photo", points: 10 },
    { id: 4, name: "Selfie with someone else celebrating a birthday", points: 15 },
    { id: 5, name: "Give a stranger a piggyback", points: 25 },
    { id: 6, name: "The number 1996 (combining photos is acceptable)", points: 10 },
    { id: 7, name: "A member of the group doing a shot", points: 15 },
    { id: 8, name: "Someone with a spice girl vibe (leopard print or blonde & pink)", points: 10 },
    { id: 9, name: "Salsa with a stranger", points: 25 },
    { id: 10, name: "A selfie with a neon sign", points: 10 },
    { id: 11, name: "Someone who looks like the birthday boy", points: 15 }
  ];

  const tasksDiv = document.getElementById("tasks");

  // Render tasks
  tasks.forEach(task => {
    const div = document.createElement("div");
    div.className = "task";
    div.innerHTML = `
      <strong>${task.name} (${task.points} pts)</strong><br>
      <input type="file" id="file-${task.id}">
      <button id="btn-${task.id}">Submit</button>
    `;
    tasksDiv.appendChild(div);

    // Attach submit handler
    document.getElementById(`btn-${task.id}`).addEventListener("click", async () => {
      const nickname = document.getElementById("nickname").value.trim();
      if (!nickname) return alert("Enter nickname");

      const fileInput = document.getElementById(`file-${task.id}`);
      const file = fileInput.files[0];
      if (!file) return alert("Select photo");

      const fileName = `${Date.now()}-${file.name}`;

      try {
        // Check if user already submitted this task
        const { data: existing, error: checkError } = await sbClient
          .from("leaderboard")
          .select("*")
          .eq("Name", nickname)
          .eq("Task", task.name);
        if (checkError) throw checkError;
        if (existing.length > 0) return alert("You have already submitted this task!");

        // Upload to Supabase storage
        const { error: uploadError } = await sbClient.storage.from("photos").upload(fileName, file);
        if (uploadError) throw uploadError;

        const { data: urlData } = sbClient.storage.from("photos").getPublicUrl(fileName);

        // Insert into leaderboard
        const { error: insertError } = await sbClient.from("leaderboard").insert([{
          Name: nickname,
          Task: task.name,
          Points: task.points,
          Image: urlData.publicUrl
        }]);
        if (insertError) throw insertError;

        alert("Submitted successfully!");
        fileInput.value = "";
        loadData();

      } catch (err) {
        console.error("Submission error:", err);
        alert("Error: " + err.message);
      }
    });
  });

  // Load gallery & leaderboard
  async function loadData() {
    try {
      const { data, error } = await sbClient.from("leaderboard").select("*");
      if (error) throw error;

      const gallery = document.getElementById("gallery");
      const leaderboard = document.getElementById("leaderboard");
      gallery.innerHTML = "";
      leaderboard.innerHTML = "";

      const scores = {};
      data.forEach(row => {
        if (row.Image) {
          const img = document.createElement("img");
          img.src = row.Image;
          gallery.appendChild(img);
        }
        scores[row.Name] = (scores[row.Name] || 0) + Number(row.Points);
      });

      Object.entries(scores)
        .sort((a,b) => b[1]-a[1])
        .forEach(([name, score]) => {
          const li = document.createElement("li");
          li.textContent = `${name}: ${score} pts`;
          leaderboard.appendChild(li);
        });

    } catch (err) {
      console.error("Load data error:", err);
    }
  }

  loadData();

});
</script>

</body>
</html>
